name: Daily Knowledge Sync

on:
  schedule:
    # Runs daily at 00:00 Myanmar time (17:30 UTC)
    - cron: "30 17 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-knowledge-sync
  cancel-in-progress: false

jobs:
  sync-knowledge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync knowledge from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_KNOWLEDGE_DATABASE_ID: ${{ secrets.NOTION_KNOWLEDGE_DATABASE_ID }}
        run: npm run sync:knowledge

      - name: Commit and push if changed
        id: commit_and_push
        run: |
          git add -A

          if git diff --cached --quiet; then
            echo "No changes detected after sync."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git commit -m "chore: daily knowledge sync"
          git push origin master
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Vercel production deploy hook
        if: ${{ steps.commit_and_push.outputs.changed == 'true' }}
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL is not set. Skipping deploy hook."
            exit 0
          fi

          curl -fsSL -X POST "$VERCEL_DEPLOY_HOOK_URL"
