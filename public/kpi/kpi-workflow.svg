<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="1020" viewBox="0 0 1680 1020">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef4ff"/>
    </linearGradient>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .step-title { font: 700 15px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .step-sub { font: 500 12px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .note-title { font: 700 15px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .note-sub { font: 500 12px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .edge { stroke: #2563eb; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="1680" height="1020" fill="url(#bg)"/>
  <text x="56" y="58" class="title">KPI Module Workflow</text>
  <text x="56" y="86" class="subtitle">Lifecycle from KPI group configuration to user assignment, progress review, and reporting output.</text>

  <rect x="72" y="150" width="230" height="95" rx="12" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="92" y="184" class="step-title">1. Create KPI Group</text>
  <text x="92" y="206" class="step-sub">Define team or role-based container</text>

  <rect x="360" y="150" width="250" height="95" rx="12" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="380" y="184" class="step-title">2. Add KPI Items</text>
  <text x="380" y="206" class="step-sub">Set metrics, weighting, scoring rules</text>

  <rect x="668" y="150" width="260" height="95" rx="12" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="688" y="184" class="step-title">3. Assign Users</text>
  <text x="688" y="206" class="step-sub">Attach people or managers to KPI set</text>

  <rect x="986" y="150" width="280" height="95" rx="12" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="1006" y="184" class="step-title">4. Define Targets</text>
  <text x="1006" y="206" class="step-sub">Set expected values and review period</text>

  <rect x="1324" y="150" width="280" height="95" rx="12" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="1344" y="184" class="step-title">5. Publish KPI Cycle</text>
  <text x="1344" y="206" class="step-sub">Expose active scorecard to users</text>

  <path class="edge" d="M302 198 L360 198"/>
  <path class="edge" d="M610 198 L668 198"/>
  <path class="edge" d="M928 198 L986 198"/>
  <path class="edge" d="M1266 198 L1324 198"/>

  <rect x="140" y="390" width="280" height="95" rx="12" fill="#ecfeff" stroke="#67e8f9"/>
  <text x="160" y="424" class="step-title">6. User Views KPI</text>
  <text x="160" y="446" class="step-sub">Web or mobile sees assigned scorecard</text>

  <rect x="500" y="390" width="300" height="95" rx="12" fill="#ecfeff" stroke="#67e8f9"/>
  <text x="520" y="424" class="step-title">7. Track Progress</text>
  <text x="520" y="446" class="step-sub">Capture scores, completion, or updates</text>

  <rect x="880" y="390" width="300" height="95" rx="12" fill="#ecfeff" stroke="#67e8f9"/>
  <text x="900" y="424" class="step-title">8. Manager Reviews</text>
  <text x="900" y="446" class="step-sub">Follow up by person, KPI, or cycle</text>

  <rect x="1260" y="390" width="280" height="95" rx="12" fill="#ecfeff" stroke="#67e8f9"/>
  <text x="1280" y="424" class="step-title">9. Export Results</text>
  <text x="1280" y="446" class="step-sub">Produce reporting output for leadership</text>

  <path class="edge" d="M1464 245 C 1464 300, 280 300, 280 390"/>
  <path class="edge" d="M420 438 L500 438"/>
  <path class="edge" d="M800 438 L880 438"/>
  <path class="edge" d="M1180 438 L1260 438"/>

  <rect x="72" y="780" width="1530" height="170" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="96" y="816" class="note-title">Workflow Rules</text>
  <text x="96" y="842" class="note-sub">• KPI setup should happen before user assignment so scorecards stay consistent.</text>
  <text x="96" y="866" class="note-sub">• User targets must remain traceable to the KPI definition and review period that produced them.</text>
  <text x="96" y="890" class="note-sub">• Export outputs should reflect the same runtime data shown in dashboard and mobile views.</text>
</svg>
