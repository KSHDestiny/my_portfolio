<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="980" viewBox="0 0 1680 980">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef4ff"/>
    </linearGradient>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .zone-title { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .box-title { font: 700 15px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .box-sub { font: 500 12px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .edge { stroke: #2563eb; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .edge-soft { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrowSoft); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowSoft" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1680" height="980" fill="url(#bg)"/>
  <text x="56" y="58" class="title">KPI Module Architecture</text>
  <text x="56" y="86" class="subtitle">Logical separation between client channels, KPI application services, and persistent reporting data.</text>

  <rect x="48" y="120" width="430" height="790" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="64" y="150" class="zone-title">Client Channels</text>
  <rect x="76" y="190" width="374" height="110" rx="12" fill="#e0ecff" stroke="#93c5fd"/>
  <text x="96" y="222" class="box-title">Admin Dashboard</text>
  <text x="96" y="246" class="box-sub">KPI groups, KPI definition, assignment, exports</text>
  <rect x="76" y="330" width="374" height="110" rx="12" fill="#e0ecff" stroke="#93c5fd"/>
  <text x="96" y="362" class="box-title">Manager Workspace</text>
  <text x="96" y="386" class="box-sub">Review user progress, scores, target follow-up</text>
  <rect x="76" y="470" width="374" height="110" rx="12" fill="#e0ecff" stroke="#93c5fd"/>
  <text x="96" y="502" class="box-title">Employee Mobile</text>
  <text x="96" y="526" class="box-sub">Personal KPI visibility, scorecard review, status checks</text>

  <rect x="530" y="120" width="580" height="790" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="546" y="150" class="zone-title">Application Layer</text>
  <rect x="560" y="190" width="520" height="95" rx="12" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="580" y="222" class="box-title">GraphQL / API Layer</text>
  <text x="580" y="245" class="box-sub">Resolvers, auth context, input validation, DTO responses</text>
  <rect x="560" y="320" width="248" height="130" rx="12" fill="#dcfce7" stroke="#86efac"/>
  <text x="578" y="352" class="box-title">Repository Layer</text>
  <text x="578" y="374" class="box-sub">KPIRepository, KPIGroupRepository</text>
  <text x="578" y="394" class="box-sub">Database access for KPI setup structures</text>
  <rect x="832" y="320" width="248" height="130" rx="12" fill="#dcfce7" stroke="#86efac"/>
  <text x="850" y="352" class="box-title">Service Layer</text>
  <text x="850" y="374" class="box-sub">KPI Service</text>
  <text x="850" y="394" class="box-sub">Permission Service</text>
  <text x="850" y="414" class="box-sub">Export Service</text>
  <rect x="560" y="490" width="520" height="145" rx="12" fill="#fee2e2" stroke="#fca5a5"/>
  <text x="580" y="523" class="box-title">KPI Domain Orchestration</text>
  <text x="580" y="546" class="box-sub">Coordinates setup, assignment, review, reporting, and mobile visibility</text>
  <text x="580" y="566" class="box-sub">Keeps configuration data separate from user-level runtime progress</text>
  <text x="580" y="586" class="box-sub">Supports exports without bypassing application permissions</text>
  <rect x="696" y="670" width="248" height="130" rx="12" fill="#fef3c7" stroke="#fcd34d"/>
  <text x="714" y="702" class="box-title">Export / Reporting</text>
  <text x="714" y="724" class="box-sub">Export jobs and report generation</text>

  <rect x="1140" y="120" width="492" height="790" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="1156" y="150" class="zone-title">Data and Integration Layer</text>
  <rect x="1170" y="210" width="432" height="170" rx="12" fill="#ede9fe" stroke="#c4b5fd"/>
  <text x="1190" y="242" class="box-title">Relational Database</text>
  <text x="1190" y="276" class="box-sub">kpi_groups, kpis</text>
  <text x="1190" y="300" class="box-sub">employees, kpi_employees</text>
  <text x="1190" y="324" class="box-sub">Core KPI setup and assignment data lives here</text>
  <rect x="1170" y="500" width="432" height="120" rx="12" fill="#ede9fe" stroke="#c4b5fd"/>
  <text x="1190" y="532" class="box-title">Queue</text>
  <text x="1190" y="556" class="box-sub">Asynchronous export and reporting job processing</text>

  <path class="edge" d="M450 245 L560 238"/>
  <path class="edge" d="M450 385 L560 238"/>
  <path class="edge" d="M450 525 L560 238"/>
  <path class="edge" d="M820 285 L684 320"/>
  <path class="edge" d="M840 285 L956 320"/>
  <path class="edge" d="M820 285 L820 490"/>
  <path class="edge" d="M820 635 L820 670"/>
  <path class="edge-soft" d="M1080 560 L1170 300"/>
  <path class="edge-soft" d="M944 735 L1170 560"/>
</svg>
