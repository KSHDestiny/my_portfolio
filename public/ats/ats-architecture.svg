<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="980" viewBox="0 0 1680 980">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef6f2"/>
    </linearGradient>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .zone-title { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .box-title { font: 700 15px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .box-sub { font: 500 12px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .edge { stroke: #2563eb; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .edge-soft { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrowSoft); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowSoft" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1680" height="980" fill="url(#bg)"/>

  <text x="56" y="58" class="title">ATS CV Upload Architecture</text>
  <text x="56" y="86" class="subtitle">Queue-driven CV upload flow with ATS intake, AI extraction, applicant record building, and notification delivery.</text>

  <rect x="48" y="120" width="430" height="790" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="64" y="150" class="zone-title">Client Channels</text>

  <rect x="530" y="120" width="580" height="790" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="546" y="150" class="zone-title">Application Layer</text>

  <rect x="1140" y="120" width="492" height="790" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="1156" y="150" class="zone-title">Data and Integration Layer</text>

  <rect x="76" y="180" width="374" height="110" rx="12" fill="#e0ecff" stroke="#93c5fd"/>
  <text x="96" y="212" class="box-title">Recruiter ATS Dashboard</text>
  <text x="96" y="236" class="box-sub">
    <tspan x="96" dy="0">Upload CV, track status,</tspan>
    <tspan x="96" dy="18">review completed applicant card</tspan>
  </text>

  <rect x="76" y="465" width="374" height="110" rx="12" fill="#e0ecff" stroke="#93c5fd"/>
  <text x="96" y="497" class="box-title">Hiring Manager / HR Admin</text>
  <text x="96" y="521" class="box-sub">
    <tspan x="96" dy="0">Receives applicant update email</tspan>
    <tspan x="96" dy="18">after processing completes</tspan>
  </text>

  <rect x="76" y="750" width="374" height="110" rx="12" fill="#e0ecff" stroke="#93c5fd"/>
  <text x="96" y="782" class="box-title">Applicant</text>
  <text x="96" y="806" class="box-sub">
    <tspan x="96" dy="0">Receives invitation only when</tspan>
    <tspan x="96" dy="18">a new Job Landing account is needed</tspan>
  </text>

  <rect x="560" y="185" width="520" height="95" rx="12" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="580" y="218" class="box-title">GraphQL Layer</text>
  <text x="580" y="241" class="box-sub">
    <tspan x="580" dy="0">Upload mutation, status query,</tspan>
    <tspan x="580" dy="18">applicant detail query, auth and validation</tspan>
  </text>

  <rect x="560" y="305" width="248" height="130" rx="12" fill="#dcfce7" stroke="#86efac"/>
  <text x="578" y="336" class="box-title">Repository Layer</text>
  <text x="578" y="358" class="box-sub">ApplicantRepository</text>
  <text x="578" y="378" class="box-sub">ApplicationRepository</text>

  <rect x="832" y="305" width="248" height="130" rx="12" fill="#dcfce7" stroke="#86efac"/>
  <text x="850" y="336" class="box-title">Service Layer</text>
  <text x="850" y="362" class="box-sub">FileService, ApplicantService</text>
  <text x="850" y="384" class="box-sub">PermissionService, NotificationService</text>
  <text x="850" y="406" class="box-sub">EmailService</text>

  <rect x="560" y="470" width="520" height="110" rx="12" fill="#fee2e2" stroke="#fca5a5"/>
  <text x="580" y="500" class="box-title">ATS Running Service</text>
  <text x="580" y="522" class="box-sub">Upload accepted -> queue started -> AI reads CV -> applicant record built</text>
  <text x="580" y="544" class="box-sub">Success is published only after ATS data and downstream profile state are consistent</text>

  <rect x="560" y="642" width="248" height="130" rx="12" fill="#fef3c7" stroke="#fcd34d"/>
  <text x="578" y="673" class="box-title">Notification Service</text>
  <text x="578" y="695" class="box-sub">
    <tspan x="578" dy="0">Prepares ATS completion updates</tspan>
    <tspan x="578" dy="18">for recruiter-facing status</tspan>
  </text>
  <text x="578" y="731" class="box-sub">Supports non-blocking recruiter experience</text>

  <rect x="832" y="642" width="248" height="130" rx="12" fill="#fef3c7" stroke="#fcd34d"/>
  <text x="850" y="673" class="box-title">Communication Service</text>
  <text x="850" y="695" class="box-sub">Prepares hiring-team email updates</text>
  <text x="850" y="713" class="box-sub">Prepares applicant invitation when required</text>

  <rect x="1170" y="190" width="432" height="110" rx="12" fill="#ede9fe" stroke="#c4b5fd"/>
  <text x="1190" y="222" class="box-title">AWS S3 Storage</text>
  <text x="1190" y="246" class="box-sub">
    <tspan x="1190" dy="0">Stores uploaded CV files and</tspan>
    <tspan x="1190" dy="18">supporting extraction artifacts in S3</tspan>
  </text>

  <rect x="1170" y="330" width="432" height="110" rx="12" fill="#ede9fe" stroke="#c4b5fd"/>
  <text x="1190" y="362" class="box-title">Queue / Delivery</text>
  <text x="1190" y="386" class="box-sub">
    <tspan x="1190" dy="0">Runs the full asynchronous</tspan>
    <tspan x="1190" dy="18">workflow pipeline</tspan>
  </text>

  <rect x="1170" y="470" width="432" height="135" rx="12" fill="#ede9fe" stroke="#c4b5fd"/>
  <text x="1190" y="502" class="box-title">AI Extraction Project</text>
  <text x="1190" y="526" class="box-sub">Read queue CV jobs and returns structured applicant information</text>
  <text x="1190" y="544" class="box-sub">Profile, education, experience, skills, languages, certificates, links</text>

  <rect x="1170" y="620" width="432" height="110" rx="12" fill="#ede9fe" stroke="#c4b5fd"/>
  <text x="1190" y="652" class="box-title">ATS Database</text>
  <text x="1190" y="676" class="box-sub">
    <tspan x="1190" dy="0">Upload history, applicant records, statuses,</tspan>
    <tspan x="1190" dy="18">duplicate protection, logs</tspan>
  </text>

  <rect x="1170" y="760" width="205" height="110" rx="12" fill="#ede9fe" stroke="#c4b5fd"/>
  <text x="1190" y="792" class="box-title">Email Server</text>
  <text x="1190" y="816" class="box-sub">Hiring-team updates</text>
  <text x="1190" y="836" class="box-sub">Applicant invitations</text>

  <rect x="1397" y="760" width="205" height="110" rx="12" fill="#ede9fe" stroke="#c4b5fd"/>
  <text x="1417" y="792" class="box-title">Job Landing Database</text>
  <text x="1417" y="816" class="box-sub">Applicant account records</text>
  <text x="1417" y="836" class="box-sub">Onboarding state</text>

  <path class="edge" d="M450 235 L560 232"/>
  <path class="edge-soft" d="M450 520 L1170 815"/>
  <path class="edge-soft" d="M450 805 L1170 815"/>

  <path class="edge" d="M820 280 L684 305"/>
  <path class="edge-soft" d="M1080 232 L1170 245"/>
  <path class="edge-soft" d="M808 370 L1170 385"/>
  <path class="edge-soft" d="M1170 530 L1080 370"/>
  <path class="edge-soft" d="M1080 370 L1170 650"/>
  <path class="edge-soft" d="M1080 390 L1397 815"/>
  <path class="edge-soft" d="M1080 695 L1170 815"/>
  <path class="edge" d="M780 580 L684 642"/>
  <path class="edge" d="M920 580 L956 642"/>

  <rect x="560" y="800" width="520" height="105" rx="10" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="586" y="832" class="box-title">Ownership Boundary</text>
  <text x="586" y="852" class="box-sub">
    <tspan x="586" dy="0">ATS owns recruiter-facing intake and applicant visibility.</tspan>
    <tspan x="586" dy="18">Queue and integrations drive background processing.</tspan>
    <tspan x="586" dy="18">Job Landing owns downstream account lifecycle.</tspan>
  </text>
</svg>
