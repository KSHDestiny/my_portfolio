<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="980" viewBox="0 0 1680 980">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef4ff"/>
    </linearGradient>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .phase-title { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .item { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .edge { stroke: #2563eb; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="1680" height="980" fill="url(#bg)"/>
  <text x="56" y="58" class="title">ATS CV Upload Implementation Plan</text>
  <text x="56" y="86" class="subtitle">Delivery slices from CV intake through AI extraction, applicant creation, and ATS synchronization.</text>

  <rect x="90" y="180" width="320" height="250" rx="14" fill="#ffffff" stroke="#93c5fd"/>
  <text x="116" y="220" class="phase-title">Phase 1. Intake</text>
  <text x="116" y="258" class="item">• CV upload API and validation</text>
  <text x="116" y="288" class="item">• File storage integration</text>
  <text x="116" y="318" class="item">• Upload status and base tracking</text>
  <text x="116" y="348" class="item">• Recruiter-facing entry point</text>

  <rect x="450" y="180" width="320" height="250" rx="14" fill="#ffffff" stroke="#86efac"/>
  <text x="476" y="220" class="phase-title">Phase 2. Extraction</text>
  <text x="476" y="258" class="item">• Queue handoff to AI extraction</text>
  <text x="476" y="288" class="item">• Structured CV-to-JSON mapping</text>
  <text x="476" y="318" class="item">• Failure handling and retries</text>
  <text x="476" y="348" class="item">• Extraction completion events</text>

  <rect x="810" y="180" width="320" height="250" rx="14" fill="#ffffff" stroke="#fcd34d"/>
  <text x="836" y="220" class="phase-title">Phase 3. Applicant Build</text>
  <text x="836" y="258" class="item">• Applicant profile creation</text>
  <text x="836" y="288" class="item">• Education, skills, and experience mapping</text>
  <text x="836" y="318" class="item">• Duplicate prevention by job post</text>
  <text x="836" y="348" class="item">• ATS card-ready response shaping</text>

  <rect x="1170" y="180" width="320" height="250" rx="14" fill="#ffffff" stroke="#c4b5fd"/>
  <text x="1196" y="220" class="phase-title">Phase 4. Sync and Notify</text>
  <text x="1196" y="258" class="item">• ATS refresh after profile build</text>
  <text x="1196" y="288" class="item">• Pusher and email notification flow</text>
  <text x="1196" y="318" class="item">• Job Landing invite when required</text>
  <text x="1196" y="348" class="item">• Rollout checks and fallback handling</text>

  <path class="edge" d="M410 305 L450 305"/>
  <path class="edge" d="M770 305 L810 305"/>
  <path class="edge" d="M1130 305 L1170 305"/>

  <rect x="90" y="500" width="1400" height="160" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="116" y="544" class="phase-title">Delivery Principle</text>
  <text x="116" y="578" class="item">Keep upload and recruiter actions responsive by pushing extraction into an asynchronous flow.</text>
  <text x="116" y="608" class="item">Create applicant records only after extraction returns structured data successfully.</text>
  <text x="116" y="638" class="item">Notify users and downstream systems only after applicant build and synchronization are complete.</text>
</svg>
